services:
  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: calibrate
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - /opt/calibrate/minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - calibrate-net

  app:
    build:
      context: ..
      dockerfile: calibrate-backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - src/.env
    volumes:
      - /opt/calibrate/backend-data:/appdata
    depends_on:
      - minio
    networks:
      - calibrate-net

networks:
  calibrate-net:
    driver: bridge
